# MOM6 Diagnostic Tool Configuration
# This file can be customized to adjust the tool's behavior

# Dimension configuration
dimensions:
  vertical: ['zl', 'zi']  # Vertical dimension names that indicate 3D fields

# Diagnostic categories and their keywords
# Simple two-category system: Grid & Static, and All Diagnostics (everything else)
category_keywords:
  'Grid & Static':
    - geo
    - depth
    - area
    - wet
    - mask
    - grid
    - static

# Note: "All Diagnostics" category is automatically available and shows everything

# Default values for diag_table generation
defaults:
  base_year: 1900
  base_month: 1
  base_day: 1
  file_format: 1  # 1 = netCDF
  time_axis_units: 'days'
  time_axis_name: 'time'
  packing: 2  # 2 = real*4 (float32)
  time_sampling: 'all'
  module: 'ocean_model'
  title_template: "MOM6 diagnostic fields table for CESM case: {case_name}"
  case_name: "YOUR_CASE_NAME"

# UI configuration
ui:
  page_size: 5
  width_left_panel: '350px'
  selector_height: '160px'
  container_max_height: '400px'

  # Color scheme
  colors:
    primary: '#495057'
    secondary: '#6c757d'
    success: '#28a745'
    danger: '#dc3545'
    info: '#007bff'
    light_bg: '#f8f9fa'
    white: '#ffffff'
    border: '#dee2e6'

# Valid options for dropdown menus
options:
  frequency_units:
    - hours
    - days
    - months
    - years

  reduction_methods:
    - average
    - min
    - max
    - none

  packing:
    - label: 'real*8'
      value: 1
    - label: 'real*4'
      value: 2
    - label: '16-bit int'
      value: 4
    - label: '1-byte'
      value: 8

  regional:
    - none
    - global
    - box

  dimension_filters:
    - All
    - 2D Only
    - 3D Only

# Cache configuration
cache:
  enabled: true
  suffix: '.cache'
  max_files: 6  # Keep only the 6 most recent cache files

# Default file configurations for new projects
default_files:
  - name: 'ocean_static'
    freq: -1
    units: 'months'
    fields:
      - name: 'deptho'
        module: 'ocean_model'
        reduction: 'none'
      - name: 'geolon'
        module: 'ocean_model'
        reduction: 'none'
      - name: 'geolat'
        module: 'ocean_model'
        reduction: 'none'
      - name: 'wet'
        module: 'ocean_model'
        reduction: 'none'

  - name: 'surf_%4yr_%3dy'
    freq: 1
    units: 'hours'
    new_file_freq: 1
    new_file_freq_units: 'months'
    fields:
      - name: 'SSH'
        module: 'ocean_model'
        reduction: 'none'

  - name: 'ocean_daily'
    freq: 1
    units: 'days'
    fields:
      - name: 'tos'
        module: 'ocean_model'
        reduction: 'mean'

  - name: 'ocean_month'
    freq: 1
    units: 'months'
    fields:
      - name: 'thetao'
        module: 'ocean_model'
        reduction: 'mean'

  - name: 'ocean_annual'
    freq: 12
    units: 'months'
    fields:
      - name: 'thetao'
        module: 'ocean_model'
        reduction: 'mean'

  - name: 'ocean_Bering_Strait'
    freq: 5
    units: 'days'
    fields:
      - name: 'thetao'
        module: 'ocean_model'
        reduction: 'mean'
        regional: '-171.4 -168.7 66.1 66.1 -1 -1'
